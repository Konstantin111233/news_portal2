{% extends 'base.html' %}

{% block title %}Удалить аккаунт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>Подтверждение удаления аккаунта</h3>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить свой аккаунт?</p>
                <p class="text-muted">Все ваши новости также будут удалены. Это действие нельзя отменить.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100">Да, удалить мой аккаунт</button>
                    <a href="{% url 'news_app:profile' %}" class="btn btn-secondary w-100 mt-2">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
