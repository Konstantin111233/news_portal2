{% extends 'base.html' %}

{% block title %}Удалить новость{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h3>Подтверждение удаления</h3>
    </div>
    <div class="card-body">
        <p>Вы уверены, что хотите удалить новость <strong>"{{ news.title }}"</strong>?</p>
        <p class="text-muted">Это действие нельзя отменить.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'news_app:news_detail' news.id %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
